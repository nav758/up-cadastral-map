<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UP Cadastral Map - BhuNaksha Tiles</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@9.1.0/ol.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body, #map { width: 100%; height: 100%; }
        #info {
            position: absolute;
            top: 10px; left: 10px;
            background: rgba(255,255,255,0.95);
            padding: 12px 16px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            font-family: system-ui, sans-serif;
            font-size: 13px;
            z-index: 1000;
            max-width: 280px;
        }
        #info h3 { margin: 0 0 6px; font-size: 14px; color: #333; }
        #info p { margin: 0; color: #666; line-height: 1.4; }
        #click-info {
            position: absolute;
            bottom: 10px; right: 10px;
            background: rgba(255,255,255,0.95);
            padding: 10px 14px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            font-family: system-ui, sans-serif;
            font-size: 12px;
            z-index: 1000;
            display: none;
            max-width: 320px;
            overflow-wrap: break-word;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="info">
        <h3>🗺️ UP BhuNaksha Cadastral</h3>
        <p>Live vector tiles from <code>indianopenmaps.com</code></p>
        <p style="margin-top:6px;font-size:11px;color:#999;">Coverage: 34 districts (incomplete)</p>
    </div>
    <div id="click-info"></div>

    <script src="https://cdn.jsdelivr.net/npm/ol@9.1.0/dist/ol.js"></script>
    <script>
        const cadastralSource = new ol.source.VectorTile({
            format: new ol.format.MVT(),
            url: 'https://indianopenmaps.com/not-so-open/cadastrals/uttar-pradesh/ncog/{z}/{x}/{y}.pbf',
            attributions: '© NCOG / indianopenmaps.com'
        });

        const cadastralLayer = new ol.layer.VectorTile({
            source: cadastralSource,
            style: new ol.style.Style({
                fill: new ol.style.Fill({ color: 'rgba(66, 153, 225, 0.15)' }),
                stroke: new ol.style.Stroke({ color: '#2b6cb0', width: 1.2 })
            })
        });

        const osmLayer = new ol.layer.Tile({
            source: new ol.source.OSM(),
            opacity: 0.4
        });

        const map = new ol.Map({
            target: 'map',
            layers: [osmLayer, cadastralLayer],
            view: new ol.View({
                center: ol.proj.fromLonLat([80.9462, 26.8467]),
                zoom: 10
            })
        });

        const clickInfo = document.getElementById('click-info');
        map.on('click', function (evt) {
            const features = map.getFeaturesAtPixel(evt.pixel);
            if (features && features.length > 0) {
                const props = features[0].getProperties();
                delete props.geometry;
                clickInfo.innerHTML = '<strong>Plot Info:</strong><br><pre style="margin:4px 0;">' +
                    JSON.stringify(props, null, 2) + '</pre>';
                clickInfo.style.display = 'block';
            } else {
                clickInfo.style.display = 'none';
            }
        });
    </script>
</body>
</html>
